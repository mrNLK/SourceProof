<!DOCTYPE html>
<html>
<head>

  <style>

    svg { max-width: 600px; width: 90%; }
  </style>
</head>
<body>
  <svg viewBox="0 0 500 700" fill="none" xmlns="http://www.w3.org/2000/svg">

    <text x="420" y="55" fill="#00E5A0" font-size="9" font-family="monospace" text-anchor="end" opacity="0.6">v1.0</text>

    <rect x="216" y="148" width="80" height="36" rx="4" fill="#111116" stroke="#1e1e28" />

    <text x="436" y="170" fill="#F0F0F5" font-size="8" font-family="sans-serif" text-anchor="middle">Engage</text>

    <!-- Features section -->
    <text x="36" y="220" fill="#00E5A0" font-size="8" font-family="monospace" letter-spacing="2">FEATURES</text>
    <!-- Feature 1 -->
    <rect x="36" y="232" width="140" height="64" rx="4" fill="#111116" stroke="#1e1e28" />
    <text x="50" y="254" fill="#F0F0F5" font-size="10" font-family="sans-serif" font-weight="600">Repo Discovery</text>
    <text x="50" y="272" fill="#9E9E9E" font-size="8" font-family="sans-serif">Exa Search across GitHub</text>

    <text x="202" y="272" fill="#9E9E9E" font-size="8" font-family="sans-serif">Exa Websets monitoring</text>
    <!-- Feature 3 -->
    <rect x="340" y="232" width="140" height="64" rx="4" fill="#111116" stroke="#1e1e28" />
    <text x="354" y="254" fill="#F0F0F5" font-size="10" font-family="sans-serif" font-weight="600">Strategy + Eval</text>
    <text x="354" y="272" fill="#9E9E9E" font-size="8" font-family="sans-serif">Claude parallel analysis</text>

    <rect x="100" y="384" width="110" height="4" rx="2" fill="#00E5A0" opacity="0.7" />
    <text x="228" y="390" fill="#00E5A0" font-size="7" font-family="monospace" text-anchor="end">92%</text>
    <text x="50" y="412" fill="#9E9E9E" font-size="7" font-family="monospace">Reviews</text>
    <rect x="100" y="406" width="120" height="4" rx="2" fill="#1e1e28" />

    <text x="228" y="412" fill="#00E5A0" font-size="7" font-family="monospace" text-anchor="end">78%</text>
    <text x="50" y="434" fill="#9E9E9E" font-size="7" font-family="monospace">Issues</text>

    <rect x="100" y="428" width="78" height="4" rx="2" fill="#00E5A0" opacity="0.7" />
    <text x="228" y="434" fill="#00E5A0" font-size="7" font-family="monospace" text-anchor="end">65%</text>

    <text x="278" y="366" fill="#F0F0F5" font-size="10" font-family="sans-serif" font-weight="600">Expertise</text>
    <text x="278" y="390" fill="#9E9E9E" font-size="7" font-family="monospace">Code</text>
    <rect x="328" y="384" width="120" height="4" rx="2" fill="#1e1e28" />

    <rect x="328" y="406" width="120" height="4" rx="2" fill="#1e1e28" />
    <rect x="328" y="406" width="85" height="4" rx="2" fill="#00E5A0" opacity="0.7" />
    <text x="456" y="412" fill="#00E5A0" font-size="7" font-family="monospace" text-anchor="end">71%</text>
    <text x="278" y="434" fill="#9E9E9E" font-size="7" font-family="monospace">Tests</text>
    <rect x="328" y="428" width="120" height="4" rx="2" fill="#1e1e28" />

    <text x="456" y="434" fill="#00E5A0" font-size="7" font-family="monospace" text-anchor="end">83%</text>

    <!-- Row 1 -->
    <rect x="36" y="512" width="104" height="24" rx="12" fill="#111116" stroke="#1e1e28" />
    <text x="88" y="528" fill="#9E9E9E" font-size="8" font-family="monospace" text-anchor="middle">React</text>
    <rect x="150" y="512" width="104" height="24" rx="12" fill="#111116" stroke="#1e1e28" />
    <text x="202" y="528" fill="#9E9E9E" font-size="8" font-family="monospace" text-anchor="middle">TypeScript</text>
    <rect x="264" y="512" width="104" height="24" rx="12" fill="#111116" stroke="#1e1e28" />
    <text x="316" y="528" fill="#9E9E9E" font-size="8" font-family="monospace" text-anchor="middle">Tailwind</text>
    <rect x="378" y="512" width="104" height="24" rx="12" fill="#111116" stroke="#1e1e28" />
    <text x="430" y="528" fill="#9E9E9E" font-size="8" font-family="monospace" text-anchor="middle">Vite</text>

    <text x="316" y="560" fill="#9E9E9E" font-size="8" font-family="monospace" text-anchor="middle">Supabase</text>
    <rect x="378" y="544" width="104" height="24" rx="12" fill="#111116" stroke="#1e1e28" />
    <text x="430" y="560" fill="#9E9E9E" font-size="8" font-family="monospace" text-anchor="middle">Vercel</text>

    <text x="464" y="624" fill="#9E9E9E" font-size="7" font-family="monospace" text-anchor="end" opacity="0.5">Technical sourcing on GitHub signal</text>
